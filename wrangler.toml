name = "clover-sales-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# Cron trigger: 11:55 PM ET (03:55 UTC) daily for end-of-day snapshots
[triggers]
crons = ["55 3 * * *"]

# KV namespace for storing daily sales snapshots
# Create with: npx wrangler kv:namespace create SALES_SNAPSHOTS
# Then replace the id below with the generated namespace ID
[[kv_namespaces]]
binding = "SALES_SNAPSHOTS"
id = "<run: npx wrangler kv:namespace create SALES_SNAPSHOTS>"
