name = "clover-sales-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# Cron triggers:
#   - "55 3 * * *"  — 11:55 PM ET (03:55 UTC) daily end-of-day snapshot rollup
#   - "* * * * *"   — every minute: sale scheduler (activate pending, revert expired)
[triggers]
crons = ["55 3 * * *", "* * * * *"]

[vars]
BL1_MERCHANT_ID = "T3M0E73JKKF11"
BL1_API_TOKEN = "3fd8c798-4d94-c0a8-c24d-49c870b48d97"
BL2_MERCHANT_ID = "57QXWH2573AX1"
BL2_API_TOKEN = "10721302-dee5-6bb0-0544-03ed92c36ed7"
BL4_MERCHANT_ID = "PVBSM4E6G94V1"
BL4_API_TOKEN = "eff1f746-a7c0-f7da-9e58-adeb1c4adb6a"
BL8_MERCHANT_ID = "57KWEPWZ4BHT1"
BL8_API_TOKEN = "5f208df2-03dc-0229-892f-96b8e129e731"
BL12_MERCHANT_ID = "1AEWTY5Q9A3G1"
BL12_API_TOKEN = "cdcb4c4b-831f-3934-351a-4f276d7858d3"
BL14_MERCHANT_ID = "1RBVSDGEQYA21"
BL14_API_TOKEN = "48ba6534-724a-9bdc-a0ff-a21e73b2d69c"
SNAPSHOT_SECRET = "mapcaj-saTxa2-1"

# KV namespace for storing daily sales snapshots
# Create with: npx wrangler kv:namespace create SALES_SNAPSHOTS
# Then replace the id below with the generated namespace ID
[[kv_namespaces]]
binding = "SALES_SNAPSHOTS"
id = "8f6062a726fd4fd2afcffc0512790884"

# D1 database for structured historical sales data
# Create with: npx wrangler d1 create labor-dashboard-db
# Then replace the database_id below with the generated ID
# Apply schema: npx wrangler d1 execute labor-dashboard-db --file=schema.sql
[[d1_databases]]
binding = "DB"
database_name = "labor-dashboard-db"
database_id = "3fa911d7-31d6-438c-985f-7ac08c407d2d"
