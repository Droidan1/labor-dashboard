BL16_API_TOKEN = "cdcb4c4b-831f-3934-351a-4f276d7858d3"
SNAPSHOT_SECRET = "mapcaj-saTxa2-1"
VAPID_SUBJECT = "mailto:noreply@retjghub.com"
# VAPID key pair — set as secrets, NOT vars:
#   npx wrangler secret put VAPID_PUBLIC_KEY
#   npx wrangler secret put VAPID_PRIVATE_KEY

# KV namespace for storing daily sales snapshots
# Create with: npx wrangler kv:namespace create SALES_SNAPSHOTS
# Then replace the id below with the generated namespace ID
[[kv_namespaces]]
binding = "SALES_SNAPSHOTS"
id = "8f6062a726fd4fd2afcffc0512790884"

# D1 database for structured historical sales data
# Create with: npx wrangler d1 create labor-dashboard-db
# Then replace the database_id below with the generated ID
# Apply schema: npx wrangler d1 execute labor-dashboard-db --file=schema.sql
[[d1_databases]]
binding = "DB"
database_name = "labor-dashboard-db"
database_id = "3fa911d7-31d6-438c-985f-7ac08c407d2d"

# ── Staging environment ───────────────────────────────────────────────
# Deploy:  npx wrangler deploy --env staging
# Isolated D1 + KV; NO crons (avoids double notifications / snapshot writes).
# Secrets are per-env — set them once:
#   npx wrangler secret put VAPID_PUBLIC_KEY  --env staging
#   npx wrangler secret put VAPID_PRIVATE_KEY --env staging
# Named environments do NOT inherit top-level [vars], so they are repeated here.
[env.staging]
name = "clover-sales-api-staging"

# Staging runs ONLY the Meta marketing refresh cron — NOT the snapshot /
# notification jobs (those would double-fire against prod data). Named envs
# otherwise inherit the top-level [triggers], so this list is explicit.
[env.staging.triggers]
crons = ["30 10 * * *"]

